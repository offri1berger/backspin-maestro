services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_DB: backspin_maestro
      POSTGRES_USER: backspin_maestro
      POSTGRES_PASSWORD: backspin_maestro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backspin_maestro -d backspin_maestro']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: