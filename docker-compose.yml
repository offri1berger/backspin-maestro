services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hitster
      POSTGRES_USER: hitster
      POSTGRES_PASSWORD: hitster
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: