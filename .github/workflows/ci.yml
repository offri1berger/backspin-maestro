name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check shared
        run: pnpm --filter @hitster/shared build

      - name: Type-check server
        run: pnpm --filter @hitster/server build

      - name: Type-check + build client
        run: pnpm --filter @hitster/client build

      - name: Lint client
        run: pnpm --filter @hitster/client exec eslint src

      - name: Lint server
        run: pnpm --filter @hitster/server exec eslint src

      - name: Test server
        run: pnpm --filter @hitster/server test

      - name: Test client
        run: pnpm --filter @hitster/client test

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: false
          build-args: |
            VITE_R2_BASE_URL=https://placeholder.r2.dev
            VITE_SERVER_URL=https://placeholder.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
