name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type-check shared
        run: pnpm --filter @hitster/shared build

      - name: Type-check server
        run: pnpm --filter @hitster/server build

      - name: Type-check + build client
        run: pnpm --filter @hitster/client build

      - name: Lint client
        run: pnpm --filter @hitster/client exec eslint src
